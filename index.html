<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>labyrinth terminal</title>
    <meta name="description" content="terminal. external visibility limited. infrastructure remains operational." />
    <meta property="og:title" content="labyrinth terminal" />
    <meta property="og:description" content="underground detected. monitoring continues." />

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css" />

    <link rel="icon" type="image/png" href="assets/circle.png" />
  </head>

  <body>
    <!-- Header / status -->
    <header class="site-header">

      <div class="header-right">
        <div role="tablist" class="nav" aria-label="terminal navigation">
          <button id="tab-stat" role="tab" aria-controls="panel-stat" aria-selected="true">terminal</button>
          <button id="tab-inv" role="tab" aria-controls="panel-inv" aria-selected="false">intake</button>
          <button id="tab-baseline" role="tab" aria-controls="panel-baseline" aria-selected="false">baseline</button>
          <button id="tab-map" role="tab" aria-controls="panel-map" aria-selected="false">record</button>
        </div>
      </div>
    </header>

    <main class="deck">
      <!-- TERMINAL: Title + Preview + Boot Log -->
      <section id="panel-stat" role="tabpanel">
        <section class="panel panel--title">
   <div class="hud-clock">
  <span class="hud-clock-time" id="clock-date">000000</span>
  <span class="hud-clock-sub" id="clock-time">0000</span>
</div>
          <a href="#panel-inv" class="transmit-button"> access </a>
        </section>

        <!-- Cam preview (left) -->
        <section class="panel panel--cam panel--cam--preview panel--link">
          <a href="#tab-inv">
            <img src="assets/camera/003.jpg" loading="lazy" decoding="async" width="800" height="600" alt="camera still" />
            <span class="cam-label"> // </span>
          </a>
        </section>

      </section>

      <!-- CAMERA: image-only feed -->
      <section id="panel-inv" role="tabpanel" hidden>
        <section class="panel panel--monitors">
          <ul id="monitorsGrid" class="monitors-grid" aria-label="camera feed"></ul>

          <!-- archive navigation (embedded inside monitor panel) -->
          <div class="monitor-archive-nav" aria-label="archive navigation">
            <button type="button" id="archivePrev" aria-label="previous archive page">
              &lt;
            </button>
            <button type="button" id="archiveNext" aria-label="next archive page">
              &gt;
            </button>
          </div>
        </section>
      </section>

      <!-- BASELINE (restricted access) -->
      <section id="panel-baseline" role="tabpanel" hidden>
        <section class="panel panel--title panel--baseline">
          <h2> </h2>

          <div class="baseline-gate" aria-hidden="true">
            <input
              type="password"
              class="baseline-input"
              placeholder=""
              aria-label="baseline verification"
              autocomplete="off"
              autocorrect="off"
              autocapitalize="off"
              spellcheck="false"
            />
            <button class="baseline-enter" tabindex="-1"> deposit </button>
          </div>

          <p class="baseline-status" hidden> // denied </p>
        </section>
      </section>

      <!-- GRID -->
      <section id="panel-map" role="tabpanel" hidden>
        <section class="panel panel--title">
          <h2>placement</h2>
          <p class="subtitle"> observation confirms participation </p>
        </section>
        <section class="panel panel--grid">
          <ul class="grid-list" id="gridList"></ul>
        </section>
      </section>
    </main>

    <footer>
      <p></p>
    </footer>

    <!-- Image Viewer (global overlay) -->
    <div id="imageViewer" class="image-viewer" hidden>
      <div class="image-viewer-backdrop"></div>
      <button class="image-viewer-close" aria-label="Close">×</button>
      <img class="image-viewer-img" alt="" />
    </div>

    <script src="js/script.js" defer></script>
  </body>
</html>
