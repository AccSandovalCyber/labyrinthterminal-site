<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>labyrinth terminal</title>
    <meta name="description" content="terminal. external visibility limited. infrastructure remains operational." />
    <meta property="og:title" content="labyrinth terminal" />
    <meta property="og:description" content="underground detected. monitoring continues." />

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/sterile.css" />

    <link rel="icon" type="image/png" href="assets/circle.png" />
  </head>

  <body>

    <main class="deck">
      <header class="site-header site-header--spine">
        <nav role="tablist" class="nav nav--spine" aria-label="terminal navigation">

          <button
            type="button"
            role="tab"
            id="tab-terminal"
            aria-selected="true"
            aria-controls="panel-stat"
          >
            terminal
          </button>

          <button
            type="button"
            role="tab"
            id="tab-intake"
            aria-selected="false"
            aria-controls="panel-inv"
          >
            intake
          </button>

          <button
            type="button"
            role="tab"
            id="tab-baseline"
            aria-selected="false"
            aria-controls="panel-baseline"
          >
            baseline
          </button>

          <button
            type="button"
            role="tab"
            id="tab-record"
            aria-selected="false"
            aria-controls="panel-map"
          >
            record
          </button>

        </nav>

      </header>

      <div class="hud-clock hud-clock--fixed">
        <span class="hud-clock-time" id="clock-date">000000</span>
        <span class="hud-clock-sub" id="clock-time">0000</span>
      </div>

      <section id="panel-stat" role="tabpanel" aria-labelledby="tab-terminal" hidden>
        <div class="panel panel--terminal"></div>
      </section>

      <section id="panel-inv" role="tabpanel" aria-labelledby="tab-intake" hidden>
        <div class="panel panel--monitors">
          <ul id="monitorsGrid" class="monitors-grid" aria-label="camera feed"></ul>

          <div class="monitor-archive-nav" aria-label="archive navigation">
            <button type="button" id="archivePrev" aria-label="previous archive page">
              &lt;
            </button>
            <button type="button" id="archiveNext" aria-label="next archive page">
              &gt;
            </button>
          </div>
        </div>
      </section>

      <section id="panel-baseline" role="tabpanel" aria-labelledby="tab-baseline" hidden>
        <div class="panel panel--baseline">

          <div class="baseline-gate" aria-hidden="true">
            <input
              type="password"
              class="baseline-input"
              placeholder=""
              aria-label="baseline verification"
              autocomplete="off"
              autocorrect="off"
              autocapitalize="off"
              spellcheck="false"
            />
            <button class="baseline-enter" tabindex="-1"> deposit </button>
          </div>

          <p class="baseline-status" hidden> // denied </p>
        </div>
      </section>

      <section id="panel-map" role="tabpanel" aria-labelledby="tab-record" hidden>
        <div class="panel panel--records">
          <h2 class="records-title">placement</h2>
          <p class="records-subtitle">observation confirms participation</p>
          <ul class="records-list" id="gridList"></ul>
        </div>
      </section>

      <div class="system-footer-right">
        <a href="https://www.youtube.com/@labyrinthterminal" target="_blank" rel="noopener">
          carrier
        </a>
      </div>
    </main>

    <div id="imageViewer" class="image-viewer" hidden>
      <div class="image-viewer-backdrop"></div>
      <button class="image-viewer-close" aria-label="Close">×</button>
      <img class="image-viewer-img" alt="" />
    </div>

    <script src="js/script.js?v=2" defer></script>
  </body>
</html>
